<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Boda</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  color: #5a4a42;
  scroll-behavior: smooth;
  overflow-x: hidden;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: radial-gradient(circle, #f8f4ee, #e9dfd3);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.scene { text-align: center; cursor: pointer; }

.envelope {
  position: relative;
  width: 280px;
  height: 180px;
}

.body-env {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #d8b89c;
  border-radius: 6px;
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #c9a27c;
  clip-path: polygon(0 0, 100% 0, 50% 55%);
  transform-origin: top;
  transition: 1s;
}

.letter {
  position: absolute;
  width: 90%;
  height: 90%;
  background: #fffaf5;
  top: 5%;
  left: 5%;
  border-radius: 5px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: 1s;
}

.open .flap { transform: rotateX(180deg); }
.open .letter { transform: translateY(-120px); }

/* SECCIONES */
section {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 30px;
  text-align: center;
  opacity: 0;
  transform: translateY(30px);
  transition: .8s;
}

section.show {
  opacity: 1;
  transform: translateY(0);
}

/* HERO */
.hero {
  background:
    linear-gradient(rgba(245,239,230,0.5), rgba(245,239,230,0.5)),
    url('./base2.jpg');
  background-size: cover;
  background-position: center;
}

.hero2 {
  background:
    linear-gradient(rgba(245,239,230,0.5), rgba(245,239,230,0.5)),
    url('./base3.jpeg');
  background-size: cover;
  background-position: center;
}

.names {
  font-family: 'Great Vibes', cursive;
  font-size: 3rem;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: #c9a27c;
  color: white;
  cursor: pointer;
}

/* CONTADOR */
.timer { display: flex; gap: 10px; }
.timer div {
  background: white;
  padding: 10px;
  border-radius: 10px;
}

/* MODAL RSVP */
.modal {
  position: fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
}

input, select {
  width:100%;
  padding:10px;
  margin:10px 0;
}

/* MUSICA */
.music-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: #c9a27c;
  color: white;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  border: none;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="scene" onclick="abrirInvitacion()">
    <div class="envelope">
      <div class="flap"></div>
      <div class="body-env"></div>
      <div class="letter">
        <h2>Raúl & Brenda</h2>
        <p>Te invitan a su boda</p>
      </div>
    </div>
    <p>Toca para abrir 💌</p>
  </div>
</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>
<audio id="music" loop>
  <source src="./titanic.mp3">
</audio>

<!-- HERO -->
<section class="hero2">
  <div class="names">Itzel Sánchez <br> & <br> Raúl Arteaga</div>
  <h3 id="invitado"></h3>
  <h2>“El amor nos une hoy y para siempre” 💍</h2>
</section>

<!-- DETALLES -->
<section class="hero">
  <h1>20 Marzo 2027</h1>
  <p>5:00 PM</p>
</section>

<!-- CONTADOR -->
<section class="hero">
  <h1>Faltan...</h1>
  <div class="timer">
    <div><span id="days"></span><br>Días</div>
    <div><span id="hours"></span><br>Horas</div>
    <div><span id="minutes"></span><br>Min</div>
    <div><span id="seconds"></span><br>Seg</div>
  </div>
</section>

<!-- RSVP -->
<section class="hero">
  <h1>Confirma tu asistencia</h1>
  <button class="btn" onclick="abrirModal()">Confirmar</button>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Confirmar asistencia</h3>

    <select id="asiste">
      <option value="">¿Asistirás?</option>
      <option value="SI">Sí</option>
      <option value="NO">No</option>
    </select>

    <input type="number" id="personas" placeholder="Número de personas">

    <button class="btn" onclick="enviarRSVP()">Enviar</button>
    <p id="msg"></p>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyuH5kh67S7KXl0BGuVq19OimWLNAclI-5DXHmVHo0fMSow6OZFltI6t8-WaZoeTxQJ/exec";

// nombre dinámico
let params = new URLSearchParams(window.location.search);
let nombre = params.get("nombre") || "Invitado";
document.getElementById("invitado").innerText = nombre + ", estás invitado 💌";

// intro
function abrirInvitacion(){
  document.querySelector(".scene").classList.add("open");
  let audio = document.getElementById("music");
  audio.play().catch(()=>{});
  setTimeout(()=>{ document.getElementById("intro").style.display="none"; },2000);
}

// scroll animación
function mostrarSecciones(){
  document.querySelectorAll("section").forEach(sec=>{
    if(sec.getBoundingClientRect().top < window.innerHeight - 80){
      sec.classList.add("show");
    }
  });
}
window.addEventListener("scroll", mostrarSecciones);
window.addEventListener("load", mostrarSecciones);

// contador
const fecha = new Date("March 20, 2027 17:00:00").getTime();
setInterval(()=>{
  let diff=fecha-new Date().getTime();
  document.getElementById("days").innerText=Math.floor(diff/(1000*60*60*24));
  document.getElementById("hours").innerText=Math.floor((diff/(1000*60*60))%24);
  document.getElementById("minutes").innerText=Math.floor((diff/(1000*60))%60);
  document.getElementById("seconds").innerText=Math.floor((diff/1000)%60);
},1000);

// modal
function abrirModal(){
  document.getElementById("modal").style.display="flex";
}

// enviar
function enviarRSVP(){
  let asiste=document.getElementById("asiste").value;
  let personas=document.getElementById("personas").value;

  if(!asiste){
    alert("Selecciona opción");
    return;
  }

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      nombre:nombre,
      asiste:asiste,
      personas:personas||1
    })
  })
  .then(()=>{
    document.getElementById("msg").innerText="Confirmado 💍";
  })
  .catch(()=>{
    document.getElementById("msg").innerText="Error 😢";
  });
}

// música
function toggleMusic(){
  let m=document.getElementById("music");
  m.paused ? m.play() : m.pause();
}
</script>

</body>
</html>
