<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Boda</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  color: #5a4a42;
  scroll-behavior: smooth;
  overflow-x: hidden;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: radial-gradient(circle, #f8f4ee, #e9dfd3);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.scene {
  text-align: center;
  cursor: pointer;
}

.envelope {
  position: relative;
  width: 280px;
  height: 180px;
  perspective: 1000px;
}

.body-env {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #d8b89c;
  border-radius: 6px;
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #c9a27c;
  clip-path: polygon(0 0, 100% 0, 50% 55%);
  transform-origin: top;
  transition: 1s;
}

.letter {
  position: absolute;
  width: 90%;
  height: 90%;
  background: #fffaf5;
  top: 5%;
  left: 5%;
  border-radius: 5px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: 1s;
}

.open .flap { transform: rotateX(180deg); }
.open .letter { transform: translateY(-120px); }

/* SECCIONES */
section {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 30px;
  text-align: center;
  opacity: 0;
  transform: translateY(30px);
  transition: .8s;
}

section.show {
  opacity: 1;
  transform: translateY(0);
}

/* HERO */
.hero {
  background:
    linear-gradient(rgba(245,239,230,0.4), rgba(245,239,230,0.4)),
    url('./base.jpg');
  background-size: cover;
  background-position: center;
}

.names {
  font-family: 'Great Vibes', cursive;
  font-size: 3rem;
}

/* Botón */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: #c9a27c;
  color: white;
  cursor: pointer;
}

/* Contador */
.timer { display: flex; gap: 10px; }
.timer div {
  background: white;
  padding: 10px;
  border-radius: 10px;
}

/* Galería */
.slider {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  scroll-snap-type: x mandatory;
}

.slider img {
  width: 85%;
  height: 220px;        /* altura fija */
  object-fit: contain;    /* evita deformación */
  border-radius: 10px;
  background: #f5efe6;       /* 🔥 importante para scroll */
}

/* Música */
.music-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: #c9a27c;
  color: white;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  border: none;
}

/* Pétalos */
.petalo {
  position: fixed;
  top: -10px;
  width: 10px;
  height: 10px;
  background: pink;
  border-radius: 50%;
  opacity: 0.7;
  animation: caer linear infinite;
}

@keyframes caer {
  to { transform: translateY(110vh) rotate(360deg); }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="scene" onclick="abrirInvitacion()">
    <div class="envelope">
      <div class="flap"></div>
      <div class="body-env"></div>
      <div class="letter">
        <h2>Raúl & Brenda</h2>
        <p>Te invitan a su boda</p>
      </div>
    </div>
    <p>Toca para abrir 💌</p>
  </div>
</div>

<!-- Música -->
<button class="music-btn" onclick="toggleMusic()">🎵</button>
<audio id="music" loop>
  <source src="./titanic.mp3">
</audio>

<!-- HERO -->
<section class="hero">
  <div class="names">Raúl & Brenda Itzel</div>
  <h3 id="invitado"></h3>
  <h2>“El amor nos une hoy y para siempre” 💍</h2>
</section>

<!-- DETALLES -->
<section class="hero">
  <h1>20 Marzo 2027</h1>
  <p>5:00 PM</p>
  <button class="btn" onclick="window.open('https://maps.google.com')">Ubicación</button>
</section>

<!-- HISTORIA -->
<section>
  <h1>Nuestra Historia</h1>
  <p>Dos caminos que se cruzaron para siempre 🤍</p>
</section>

<!-- CONTADOR -->
<section>
  <h1>Faltan...</h1>
  <div class="timer">
    <div><span id="days"></span><br>Días</div>
    <div><span id="hours"></span><br>Horas</div>
    <div><span id="minutes"></span><br>Min</div>
    <div><span id="seconds"></span><br>Seg</div>
  </div>
</section>

<!-- GALERÍA -->
<section>
  <h1>Momentos</h1>
  <div class="slider">
    <img src="./boda1.jpg">
    <img src="./boda2.jpg">
    <img src="./boda3.jpg">
    <img src="./boda4.jpg">
    <img src="./boda5.jpg">
  </div>
</section>

<!-- CONFIRMAR -->
<section>
  <h1>Confirma tu asistencia</h1>
  <button class="btn" onclick="confirmar()">WhatsApp</button>
</section>

<script>
// INTRO
function abrirInvitacion(){
  document.querySelector(".scene").classList.add("open");
  document.getElementById("music").play().catch(()=>{});

  setTimeout(()=>{ document.getElementById("intro").style.display="none"; },2000);
}

// SCROLL
document.addEventListener("scroll",()=>{
  document.querySelectorAll("section").forEach(sec=>{
    if(sec.getBoundingClientRect().top < window.innerHeight-80){
      sec.classList.add("show");
    }
  });
});

// CONTADOR
let fecha=new Date("March 20, 2027 17:00:00").getTime();
setInterval(()=>{
  let diff=fecha-new Date().getTime();
  days.innerText=Math.floor(diff/(1000*60*60*24));
  hours.innerText=Math.floor((diff/(1000*60*60))%24);
  minutes.innerText=Math.floor((diff/(1000*60))%60);
  seconds.innerText=Math.floor((diff/1000)%60);
},1000);

// WHATSAPP
function confirmar(){
  window.open("https://wa.me/524772549552?text=Confirmo%20mi%20asistencia%20💍");
}

// MÚSICA
function toggleMusic(){
  let m=document.getElementById("music");
  m.paused ? m.play() : m.pause();
}

// NOMBRE DINÁMICO
let p=new URLSearchParams(window.location.search);
let n=p.get("nombre");
if(n) document.getElementById("invitado").innerText=n + ", estás invitado 💌";

// PÉTALOS
for(let i=0;i<20;i++){
  let p=document.createElement("div");
  p.className="petalo";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(p);
}
</script>

</body>
</html>
