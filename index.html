<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Boda</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  color: #5a4a42;
  scroll-behavior: smooth;
  overflow-x: hidden;
}

section {
  opacity: 1 !important;
  transform: none !important;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: radial-gradient(circle, #f8f4ee, #e9dfd3);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.scene { text-align: center; cursor: pointer; }

.envelope {
  position: relative;
  width: 280px;
  height: 180px;
  perspective: 1000px;
}

.body-env {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #d8b89c;
  border-radius: 6px;
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #c9a27c;
  clip-path: polygon(0 0, 100% 0, 50% 55%);
  transform-origin: top;
  transition: 1s;
}

.letter {
  position: absolute;
  width: 90%;
  height: 90%;
  background: #fffaf5;
  top: 5%;
  left: 5%;
  border-radius: 5px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: 1s;
}

.open .flap { transform: rotateX(180deg); }
.open .letter { transform: translateY(-120px); }

/* SECCIONES */
section {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 30px;
  text-align: center;
  opacity: 0;
  transform: translateY(30px);
  transition: .8s;
}

section.show {
  opacity: 1;
  transform: translateY(0);
}

/* HERO */
.hero {
  min-height: 100vh;
  background:
    linear-gradient(rgba(245,239,230,0.55), rgba(245,239,230,0.55)),
    url('./base2.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* GLASS */
.hero > * {
  background: rgba(255,255,255,0.6);
  backdrop-filter: blur(8px);
  padding: 15px 25px;
  border-radius: 15px;
  margin: 10px;
}

.names {
  font-family: 'Great Vibes', cursive;
  font-size: 3rem;
}

/* BOTÓN */
.btn {
  margin-top: 10px;
  padding: 14px 28px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(135deg, #c9a27c, #b8916c);
  color: white;
  cursor: pointer;
}

/* GALERÍA */
.slider {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.slider img {
  width: 85%;
  height: 220px;
  object-fit: cover;
  border-radius: 10px;
}

/* MODAL */
#modalRSVP {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:9999;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="scene" onclick="abrirInvitacion()">
    <div class="envelope">
      <div class="flap"></div>
      <div class="body-env"></div>
      <div class="letter">
        <h2>Raúl & Brenda</h2>
        <p>Te invitan a su boda</p>
      </div>
    </div>
    <p>Toca para abrir 💌</p>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="names">Itzel Sánchez <br> & <br> Raúl Arteaga</div>
  <h3 id="invitado"></h3>
  <h2>“El amor nos une hoy y para siempre” 💍</h2>
</section>

<!-- DETALLES -->
<section class="hero">
  <h1>20 Marzo 2027</h1>
  <p>5:00 PM</p>
</section>

<!-- GALERÍA -->
<section class="hero">
  <h1>Momentos</h1>
  <div class="slider">
    <img src="./boda1.jpg">
    <img src="./boda2.jpg">
    <img src="./boda3.jpg">
    <img src="./boda4.jpg">
    <img src="./boda5.jpg">
  </div>
</section>

<!-- CONFIRMAR -->
<section class="hero">
  <h1>Confirma tu asistencia</h1>
  <button class="btn" onclick="confirmarForm()">Confirmar</button>
</section>

<!-- MODAL -->
<div id="modalRSVP">
  <div style="background:white;padding:30px;border-radius:20px;width:90%;max-width:400px;text-align:center;">
    <h2>Confirmar asistencia</h2>
    <p id="nombreModal"></p>

    <select id="asiste">
      <option value="">¿Asistirás?</option>
      <option>Sí</option>
      <option>No</option>
    </select>

    <input id="personas" type="number" placeholder="Número de personas">

    <button class="btn" onclick="enviarRSVP()">Enviar</button>
    <button class="btn" onclick="cerrarModal()">Cancelar</button>

    <p id="msg"></p>
  </div>
</div>

<script>
// 🔴 PEGA TU URL AQUÍ
const API_URL = "https://script.google.com/macros/s/AKfycbyuH5kh67S7KXl0BGuVq19OimWLNAclI-5DXHmVHo0fMSow6OZFltI6t8-WaZoeTxQJ/exec";

// NOMBRE
let params=new URLSearchParams(window.location.search);
let nombre=params.get("nombre") || "Invitado";
document.getElementById("invitado").innerText = nombre + ", estás invitado 💌";

// INTRO
function abrirInvitacion(){
  document.querySelector(".scene").classList.add("open");
  setTimeout(()=>{ document.getElementById("intro").style.display="none"; },2000);
}

// MODAL
function confirmarForm(){
  document.getElementById("modalRSVP").style.display="flex";
  document.getElementById("nombreModal").innerText=nombre;
}

function cerrarModal(){
  document.getElementById("modalRSVP").style.display="none";
}

// ENVIAR
function enviarRSVP(){
  let asiste=document.getElementById("asiste").value;
  let personas=document.getElementById("personas").value;

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      nombre:nombre,
      asiste:asiste,
      personas:personas||1
    })
  })
  .then(()=>{
    document.getElementById("msg").innerText="Confirmado 💍";
  });
}
</script>

</body>
</html>
